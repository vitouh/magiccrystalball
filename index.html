<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dino</title>
<style>
  body { margin: 0; overflow: hidden; background: #f7f7f7; }
  canvas { display: block; margin: auto; background: #fff; }
</style>
</head>
<body>

<canvas id="game" width="800" height="200"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let dino = {
  x: 50,
  y: 150,
  w: 40,
  h: 40,
  dy: 0,
  gravity: 1,
  jump: -15,
  grounded: true
};

let cactus = {
  x: 800,
  y: 160,
  w: 20,
  h: 40
};

let gameOver = false;

// Jump
document.addEventListener("keydown", e => {
  if (e.code === "Space" && dino.grounded && !gameOver) {
    dino.dy = dino.jump;
    dino.grounded = false;
  }
  if (gameOver && e.code === "Space") location.reload();
});

function loop() {
  if (!gameOver) {
    dino.y += dino.dy;
    dino.dy += dino.gravity;

    if (dino.y >= 150) {
      dino.y = 150;
      dino.dy = 0;
      dino.grounded = true;
    }

    cactus.x -= 6;
    if (cactus.x < -20) cactus.x = 800;

    if (
      dino.x < cactus.x + cactus.w &&
      dino.x + dino.w > cactus.x &&
      dino.y < cactus.y + cactus.h &&
      dino.y + dino.h > cactus.y
    ) {
      gameOver = true;
    }
  }

  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#333";
  ctx.fillRect(0, 190, canvas.width, 10);

  ctx.fillStyle = "#000";
  ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

  ctx.fillRect(cactus.x, cactus.y, cactus.w, cactus.h);
}

loop();
</script>

</body>
</html>
